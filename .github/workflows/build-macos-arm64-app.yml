name: Build macOS ARM64 FAI IPQC Excel Extractor

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify ARM64 runner
        run: |
          echo "Runner architecture: $(uname -m)"
          test "$(uname -m)" = "arm64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r mac_package/requirements-mac.txt

      - name: Smoke test source imports
        run: |
          FAI_EXTRACTOR_SMOKE_TEST=1 python fai_excel_extractor_desktop.py

      - name: Build ARM64 app with PyInstaller
        working-directory: mac_package
        run: |
          pyinstaller --clean --noconfirm FAI_IPQC_Excel_Extractor.spec
          file "dist/FAI IPQC Excel Extractor.app/Contents/MacOS/FAI IPQC Excel Extractor"
          lipo -archs "dist/FAI IPQC Excel Extractor.app/Contents/MacOS/FAI IPQC Excel Extractor"
          test "$(lipo -archs "dist/FAI IPQC Excel Extractor.app/Contents/MacOS/FAI IPQC Excel Extractor")" = "arm64"
          FAI_EXTRACTOR_SMOKE_TEST=1 "dist/FAI IPQC Excel Extractor.app/Contents/MacOS/FAI IPQC Excel Extractor"
          mkdir -p release
          rm -rf "release/FAI IPQC Excel Extractor.app" "release/FAI_IPQC_Excel_Extractor_macOS_ARM64_Standalone.zip"
          cp -R "dist/FAI IPQC Excel Extractor.app" release/
          cd release
          zip -qry "FAI_IPQC_Excel_Extractor_macOS_ARM64_Standalone.zip" "FAI IPQC Excel Extractor.app"

      - name: Upload ARM64 macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: FAI_IPQC_Excel_Extractor_macOS_ARM64_Standalone
          path: mac_package/release/FAI_IPQC_Excel_Extractor_macOS_ARM64_Standalone.zip
          if-no-files-found: error
